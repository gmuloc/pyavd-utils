---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  autoupdate_commit_msg: "CI: pre-commit autoupdate"
  skip: [pyright, fmt, cargo-check, clippy, cargo-about-generate, cargo-deny]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trims trailing whitespace.
      - id: end-of-file-fixer
        name: Ensures that a file is either empty, or ends with one newline.
        exclude_types: [svg, json]
        exclude: ^pyavd_utils/THIRD_PARTY_LICENSES.txt$
      - id: check-added-large-files
        name: Prevents giant files from being committed.
      - id: check-merge-conflict
        name: Checks for files that contain merge conflict strings.

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: insert-license
        name: Check and insert license on Python files.
        files: .*\.pyi?$
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --no-extra-eol

      - id: insert-license
        name: Check and insert license on Markdown files.
        files: .*\.md$
        exclude: .github.*
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --detect-license-in-X-top-lines
          - '10'
          - --comment-style
          - '<!--|  ~|  -->'

      - name: Check and insert license on Rust files
        id: insert-license
        files: .*\.rs$
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --comment-style
          - "//"

  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: Lint Rust files using fmt (nightly)
        entry: env RUSTUP_TOOLCHAIN=nightly cargo fmt
        args:
          - --all
          - --
          - --config
          - unstable_features=true,group_imports=StdExternalCrate,imports_granularity=Item
        files: ^rust/
        pass_filenames: false
      - id: cargo-check
        name: Lint Rust files using cargo check
        args: ["--locked"]
        files: ^rust/
      - id: clippy
        name: Lint Rust files using clippy
        args: ["--locked", "--all-targets", "--all-features"]
        files: ^rust/

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.6
    hooks:
      # Check licenses of Rust dependencies
      - id: cargo-deny
        args: ["--locked", "--all-features", "check"]
        files: ^rust/

  - repo: local
    hooks:
      - id: cargo-about-generate
        name: Generate third-party Rust licenses
        entry: cargo-about generate --locked --fail -o pyavd_utils/THIRD_PARTY_LICENSES.txt about-text.hbs
        language: rust
        additional_dependencies: ["cli:cargo-about:0.8.4"]
        files: (^|/)Cargo\.(toml|lock)$|^about\.toml$|^about-text\.hbs$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.12
    hooks:
      # Run the linter.
      - id: ruff
        args:
          - --fix
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        name: PyRight static type checker
        types: [python]
        additional_dependencies:
          - 'pytest>=8.2.0'

  - repo: https://github.com/pycqa/pylint
    rev: "v4.0.5"
    hooks:
      - id: pylint # Use pylintrc file in repository
        name: Check for Linting errors on Python.
        description: This hook runs pylint.
        types: [python]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        name: Check for common misspellings in text files.
        entry: codespell
        language: python
        types: [text]
        exclude: ^(pyavd_utils/THIRD_PARTY_LICENSES.txt|Cargo.lock)$
        args:
          - '--ignore-words=.github/ignore-codespell-words'  # Ignore words listed in this file

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
        name: Check for Linting errors on Markdown files with settings defined in `.markdownlint-cli2.yaml`.
