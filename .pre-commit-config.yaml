---
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
ci:
  autoupdate_commit_msg: "CI: pre-commit autoupdate"
  skip: [pyright, cargo-fmt-nightly, cargo-check, cargo-clippy, cargo-about, cargo-deny]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trims trailing whitespace.
      - id: end-of-file-fixer
        name: Ensures that a file is either empty, or ends with one newline.
        exclude_types: [svg, json]
        exclude: ^pyavd_utils/THIRD_PARTY_LICENSES.txt$
      - id: check-added-large-files
        name: Prevents giant files from being committed.
      - id: check-merge-conflict
        name: Checks for files that contain merge conflict strings.

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: ad1b27d73581aa16cca06fc4a0761fc563ffe8e8  # frozen: v1.5.6
    hooks:
      - id: insert-license
        name: Check and insert license on Python files.
        files: .*\.pyi?$
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --no-extra-eol

      - id: insert-license
        name: Check and insert license on Markdown files.
        files: .*\.md$
        exclude: .github.*
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --detect-license-in-X-top-lines
          - '10'
          - --comment-style
          - '<!--|  ~|  -->'

      - name: Check and insert license on Rust files
        id: insert-license
        files: .*\.rs$
        args:
          - --license-filepath
          - .github/license-short.txt
          - --use-current-year
          - --allow-past-years
          - --fuzzy-match-generates-todo
          - --comment-style
          - "//"

  - repo: https://github.com/arista-netdevops-community/pre-commit-hooks
    rev: e79ab81e3d36a37a620c0b2cefd262b82a1943fd  # frozen: v0.1.3
    hooks:
      - id: cargo-fmt-nightly
        args:
          - --all
          - --
          - --config
          - unstable_features=true,group_imports=StdExternalCrate,imports_granularity=Item
        files: ^rust/
      - id: cargo-check
        args: ["--locked"]
        files: ^rust/
      - id: cargo-clippy
        args:
          - --locked
          - --all-targets
          - --all-features
        files: ^rust/
      # Check licenses of Rust dependencies
      - id: cargo-deny
        args:
          - --locked
          - --all-features
          - check
        files: ^rust/
      - id: cargo-about
        name: Generate third-party Rust licenses
        args:
          - generate
          - --locked
          - -o
          - pyavd_utils/THIRD_PARTY_LICENSES.txt
          - about-text.hbs
        files: (^|/)Cargo\.(toml|lock)$|^about\.toml$|^about-text\.hbs$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: 77039ccbba72c8aede339c5f8ae29b42aced0a2e  # frozen: v0.15.18
    hooks:
      # Run the linter.
      - id: ruff
        args:
          - --fix
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: 509391adec397533e39c65449e0c85d93d48e777  # frozen: v1.1.410
    hooks:
      - id: pyright
        name: PyRight static type checker
        types: [python]
        additional_dependencies:
          - 'pytest>=8.2.0'

  - repo: https://github.com/pycqa/pylint
    rev: "8a396357098337ba8be714fffdf2d00947a9778c"  # frozen: v4.0.6
    hooks:
      - id: pylint # Use pylintrc file in repository
        name: Check for Linting errors on Python.
        description: This hook runs pylint.
        types: [python]

  - repo: https://github.com/codespell-project/codespell
    rev: 2ccb47ff45ad361a21071a7eedda4c37e6ae8c5a  # frozen: v2.4.2
    hooks:
      - id: codespell
        name: Check for common misspellings in text files.
        entry: codespell
        language: python
        types: [text]
        exclude: ^(pyavd_utils/THIRD_PARTY_LICENSES.txt|Cargo.lock)$
        args:
          - '--ignore-words=.github/ignore-codespell-words'  # Ignore words listed in this file

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: 996abf60411a8d954288ac9856aae7602b80cbda  # frozen: v0.22.1
    hooks:
      - id: markdownlint-cli2
        name: Check for Linting errors on Markdown files with settings defined in `.markdownlint-cli2.yaml`.

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: e3eebf65325ccc992422292cb7a4baee967cf815  # frozen: v1.26.1
    hooks:
      - id: zizmor
        name: Check GitHub Actions with zizmor
        files: ^\.github/
        pass_filenames: false
        args: [".github"]
