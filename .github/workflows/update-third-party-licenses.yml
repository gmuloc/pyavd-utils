---
name: Auto-Update Third Party Licenses

"on":
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-license:
    if: github.actor == 'renovate[bot]' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-about
        run: cargo install --locked cargo-about --version 0.8.4

      - name: Generate third-party license file
        run: cargo-about generate --locked --fail -o pyavd_utils/THIRD_PARTY_LICENSES.txt about-text.hbs

      - name: Commit and push changes back to PR
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add pyavd_utils/THIRD_PARTY_LICENSES.txt

          if ! git diff --staged --quiet; then
            git commit -m "chore: auto-update THIRD PARTY LICENSE"
            git push
          else
            echo "No license changes detected. Skipping commit."
          fi
