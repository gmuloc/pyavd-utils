---
name: zizmor

"on":
  pull_request:
    paths:
      - ".github/**"
  push:
    branches:
      - main
    paths:
      - ".github/**"

permissions:
  contents: read

jobs:
  zizmor:
    name: Audit GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install zizmor
        run: cargo install zizmor --version 1.25.2 --locked

      - name: Run zizmor
        run: zizmor .github
